<section class="detail">
  <h2>Album Details</h2>

  <p *ngIf="isLoading" class="state">Loading album...</p>
  <p *ngIf="!isLoading && errorMessage" class="error">{{ errorMessage }}</p>

  <div *ngIf="!isLoading && album" class="detail-card">
    <p><strong>ID:</strong> {{ album.id }}</p>

    <label for="title"><strong>Title:</strong></label>
    <input id="title" [(ngModel)]="title" />

    <div class="actions">
      <button type="button" (click)="saveAlbum()" [disabled]="isSaving">
        {{ isSaving ? 'Saving...' : 'Save' }}
      </button>
      <a [routerLink]="['/albums', album.id, 'photos']">View Photos</a>
      <button type="button" (click)="goBack()">Back</button>
    </div>
  </div>
</section>
